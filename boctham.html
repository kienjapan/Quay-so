<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bốc Thăm Phân Công Nhiệm Vụ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { background-color: #2c3034; color: #f8f9fa; font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }
        .card-custom { background-color: #3d4246; border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-top: 25px; }
        .card-header-custom { background-color: #4e545c; border-bottom: 1px solid #5c636a; border-top-left-radius: 12px !important; border-top-right-radius: 12px !important; padding: 15px 20px; }
        .btn-yellow { background-color: #e9db55; color: #212529; font-weight: 600; }
        .btn-yellow:hover { background-color: #d8ca44; }
        .text-label-yellow { color: #e9db55 !important; font-weight: bold; }
        .lucky-number-display { font-size: 5.5rem; font-weight: 800; color: #e9db55; text-shadow: 0 0 20px rgba(233,219,85,0.4); min-height: 140px; display: flex; align-items: center; justify-content: center; border: 4px dashed #4e545c; border-radius: 15px; background-color: #2c3034; }
        .table-dark-custom { --bs-table-bg: #3d4246; color: #f8f9fa; }
        .live-row { border-left: 4px solid #e9db55; }
    </style>
</head>
<body>
<div class="container">
    <div class="text-center mt-4 mb-4">
        <h2 class="fw-bold text-warning"><i class="fa-solid fa-dice me-2"></i>HỆ THỐNG BỐC THĂM QUAY SỐ</h2>
    </div>

    <!-- Admin Panel -->
    <div class="card card-custom" id="admin_panel">
        <div class="card-header-custom d-flex justify-content-between align-items-center">
            <h5 class="m-0 text-white"><i class="fa-solid fa-gear me-2"></i>Bảng Điều Hành Admin</h5>
            <button id="btn_toggle_admin" class="btn btn-sm btn-outline-light">Ẩn</button>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label text-label-yellow">Tên phiên:</label>
                    <input type="text" id="session_name" class="form-control bg-dark text-white" value="Bốc Thăm Phân Công Nhiệm Vụ">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label text-label-yellow">Xếp hạng:</label>
                    <select id="sort_mode" class="form-select bg-dark text-white">
                        <option value="asc">Số nhỏ → Làm trước</option>
                        <option value="desc">Số lớn → Làm trước</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label text-label-yellow">Số max:</label>
                    <input type="number" id="max_number" class="form-control bg-dark text-white" value="100">
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label text-label-yellow">Quy tắc:</label>
                    <input type="text" id="display_rule" class="form-control bg-dark text-white" value="Bốc thăm ngẫu nhiên từ 1 đến 100, không trùng">
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label text-label-yellow">Nhiệm vụ (mỗi dòng 1):</label>
                    <textarea id="tasks" class="form-control bg-dark text-white" rows="4">Làm báo cáo tuần\nDọn vệ sinh\nTiếp khách\nKiểm tra tài liệu\nPhối hợp bộ phận</textarea>
                </div>
            </div>
            <button id="btn_save" class="btn btn-yellow px-4"><i class="fa-solid fa-floppy-disk me-2"></i>Lưu Cấu Hình</button>
            <button id="btn_reset" class="btn btn-danger px-4 ms-2"><i class="fa-solid fa-rotate me-2"></i>Reset Phiên Mới</button>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-4 mb-4">
            <div class="card card-custom h-100">
                <div class="card-header-custom"><h5 class="m-0 text-white"><i class="fa-solid fa-play me-2"></i>Lượt Quay Của Bạn</h5></div>
                <div class="card-body d-flex flex-column justify-content-between">
                    <input type="text" id="user_name" class="form-control form-control-lg bg-dark text-white mb-3" placeholder="Nhập họ tên">
                    <div class="my-4 text-center">
                        <div id="lucky_number" class="lucky-number-display">--</div>
                    </div>
                    <button id="btn_spin" class="btn btn-yellow btn-lg w-100 py-3 fw-bold"><i class="fa-solid fa-dice me-2"></i>BẤM ĐỂ QUAY SỐ</button>
                </div>
            </div>
        </div>

        <div class="col-md-8 mb-4">
            <div class="card card-custom" id="capture_area">
                <div class="card-body">
                    <h3 id="display_session_name" class="fw-bold text-warning text-center">Đang tải...</h3>
                    <p id="display_rule_text" class="text-center text-white-50 small"></p>

                    <div id="live_container">
                        <h5 class="text-info"><i class="fa-solid fa-list"></i> Danh sách đã bốc</h5>
                        <div class="table-responsive">
                            <table class="table table-dark table-dark-custom">
                                <thead><tr><th>Thành viên</th><th>Số</th><th>Thời gian</th></tr></thead>
                                <tbody id="live_table_body"></tbody>
                            </table>
                        </div>
                    </div>

                    <div id="final_container" style="display:none;">
                        <h4 class="text-success text-center"><i class="fa-solid fa-circle-check me-2"></i>BẢNG PHÂN CÔNG CHÍNH THỨC</h4>
                        <div class="table-responsive">
                            <table class="table table-dark table-dark-custom" id="final_table"></table>
                        </div>
                        <div class="text-center mt-3">
                            <button id="btn_export" class="btn btn-success"><i class="fa-solid fa-camera"></i> Xuất Ảnh</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ==================== CONFIG ====================
const SUPABASE_URL = 'https://your-project.supabase.co';   // ← THAY
const SUPABASE_ANON_KEY = 'eyJ...';                       // ← THAY

const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const SESSION_ID = "boc_tham_main";

let currentState = {
    session_name: "Bốc Thăm Phân Công Nhiệm Vụ",
    display_rule: "Bốc thăm ngẫu nhiên từ 1 đến 100, không trùng số",
    sort_mode: "asc",
    max_number: 100,
    tasks: [],
    participants: [],
    finished: false
};

let isAdmin = true; // Bạn có thể thêm password sau nếu cần

// ==================== SUPABASE FUNCTIONS ====================
async function loadState() {
    try {
        const { data, error } = await supabase
            .from('draw_sessions')
            .select('state')
            .eq('id', SESSION_ID)
            .maybeSingle();

        if (error && error.code !== 'PGRST116') console.error(error);
        
        if (data && data.state) {
            currentState = { ...currentState, ...data.state };
        }
        renderUI();
    } catch (e) {
        console.error("Load state error:", e);
    }
}

async function saveState(updates = {}) {
    try {
        currentState = { ...currentState, ...updates, updated_at: new Date().toISOString() };
        
        await supabase
            .from('draw_sessions')
            .upsert({ id: SESSION_ID, state: currentState });
    } catch (e) {
        console.error("Save error:", e);
        alert("Lỗi kết nối Supabase!");
    }
}

// Real-time
supabase.channel('draw')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'draw_sessions' }, loadState)
    .subscribe();

// ==================== RENDER ====================
function renderUI() {
    document.getElementById("display_session_name").innerText = currentState.session_name || "Bốc Thăm";
    document.getElementById("display_rule_text").innerText = currentState.display_rule || "";

    // Live table
    let html = '';
    currentState.participants.forEach(p => {
        html += `<tr class="live-row">
            <td>${p.name}</td>
            <td><span class="badge bg-warning text-dark fs-5 px-3">${p.number}</span></td>
            <td class="small">${p.time}</td>
        </tr>`;
    });
    document.getElementById("live_table_body").innerHTML = html || `<tr><td colspan="3" class="text-muted text-center py-3">Chưa có ai bốc số</td></tr>`;

    // Final result
    if (currentState.finished && currentState.participants.length > 0) {
        document.getElementById("live_container").style.display = "none";
        document.getElementById("final_container").style.display = "block";
        renderFinalTable();
    } else {
        document.getElementById("live_container").style.display = "block";
        document.getElementById("final_container").style.display = "none";
    }

    // Khóa nút quay nếu đã bốc
    const myName = document.getElementById("user_name").value.trim();
    const hasSpun = currentState.participants.some(p => p.name === myName);
    document.getElementById("btn_spin").disabled = hasSpun || currentState.finished;
}

function renderFinalTable() {
    let sorted = [...currentState.participants].sort((a, b) => 
        currentState.sort_mode === "asc" ? a.number - b.number : b.number - a.number
    );

    let html = `<thead><tr><th>Hạng</th><th>Họ tên</th><th>Số</th><th>Nhiệm vụ</th></tr></thead><tbody>`;
    sorted.forEach((p, i) => {
        const task = currentState.tasks[i] || "Không có nhiệm vụ";
        html += `<tr>
            <td><span class="badge bg-primary">${i+1}</span></td>
            <td class="fw-bold">${p.name}</td>
            <td class="text-warning fw-bold">${p.number}</td>
            <td class="text-start">${task}</td>
        </tr>`;
    });
    html += `</tbody>`;
    document.getElementById("final_table").innerHTML = html;
}

// ==================== EVENTS ====================
document.getElementById("btn_spin").addEventListener("click", async () => {
    const name = document.getElementById("user_name").value.trim();
    if (!name) return alert("Vui lòng nhập họ tên!");

    if (currentState.participants.some(p => p.name === name)) {
        return alert("Bạn đã bốc số rồi!");
    }

    const used = currentState.participants.map(p => p.number);
    let number;
    do {
        number = Math.floor(Math.random() * currentState.max_number) + 1;
    } while (used.includes(number));

    currentState.participants.push({
        name: name,
        number: number,
        time: new Date().toLocaleTimeString('vi-VN')
    });

    if (currentState.tasks.length > 0 && currentState.participants.length >= currentState.tasks.length) {
        currentState.finished = true;
    }

    await saveState();
});

document.getElementById("btn_save").addEventListener("click", async () => {
    const tasks = document.getElementById("tasks").value
        .split('\n')
        .map(t => t.trim())
        .filter(t => t);

    await saveState({
        session_name: document.getElementById("session_name").value,
        display_rule: document.getElementById("display_rule").value,
        sort_mode: document.getElementById("sort_mode").value,
        max_number: parseInt(document.getElementById("max_number").value) || 100,
        tasks: tasks,
        finished: false,
        participants: []   // Reset người tham gia khi lưu config mới
    });
    alert("✅ Đã lưu cấu hình!");
});

document.getElementById("btn_reset").addEventListener("click", async () => {
    if (confirm("Reset toàn bộ phiên bốc thăm?")) {
        currentState.participants = [];
        currentState.finished = false;
        await saveState({});
        alert("Đã tạo phiên mới!");
    }
});

document.getElementById("btn_toggle_admin").addEventListener("click", () => {
    const panel = document.getElementById("admin_panel");
    panel.style.display = panel.style.display === "none" ? "block" : "none";
});

document.getElementById("btn_export").addEventListener("click", () => {
    html2canvas(document.getElementById("capture_area"), {backgroundColor: "#3d4246"})
        .then(canvas => {
            const link = document.createElement('a');
            link.download = `BocTham_${new Date().toISOString().slice(0,10)}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
});

// Auto load
loadState();
setInterval(loadState, 1500); // Backup poll
</script>
</body>
</html>
